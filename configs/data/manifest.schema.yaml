{
  "$schema": "https://json-schema.org/draft/2020-12/schema",
  "$id": "https://github.com/yoshidashingo/falcie/configs/data/manifest.schema.yaml",
  "title": "fal'Cie Dataset Manifest",
  "type": "object",
  "additionalProperties": false,
  "required": [
    "name",
    "version",
    "source",
    "license",
    "license_review",
    "use",
    "languages",
    "domains",
    "estimated_tokens",
    "retrieval_script",
    "processing_config",
    "filters",
    "status",
    "pii_policy",
    "contamination_check"
  ],
  "properties": {
    "name": {
      "type": "string",
      "minLength": 1
    },
    "version": {
      "type": "string",
      "description": "Dataset snapshot date or upstream version.",
      "minLength": 1
    },
    "source": {
      "type": "string",
      "description": "Source URL, retrieval method, or repository reference.",
      "minLength": 1
    },
    "license": {
      "type": "string",
      "description": "License or terms summary.",
      "minLength": 1
    },
    "license_review": {
      "type": "string",
      "enum": [
        "compatible",
        "needs_review",
        "restricted",
        "rejected"
      ]
    },
    "use": {
      "type": "string",
      "enum": [
        "pretraining",
        "supervised_fine_tuning",
        "preference_training",
        "evaluation",
        "tokenizer"
      ]
    },
    "languages": {
      "type": "array",
      "items": {
        "type": "string",
        "pattern": "^[a-z]{2,3}(-[A-Z]{2})?$"
      },
      "minItems": 1,
      "uniqueItems": true
    },
    "domains": {
      "type": "array",
      "items": {
        "type": "string",
        "minLength": 1
      },
      "minItems": 1,
      "uniqueItems": true
    },
    "estimated_tokens": {
      "type": "integer",
      "minimum": 0
    },
    "retrieval_script": {
      "type": "string",
      "description": "Path to a script or NOT_APPLICABLE for manually reviewed sources.",
      "minLength": 1
    },
    "processing_config": {
      "type": "string",
      "description": "Path to processing config or NOT_APPLICABLE.",
      "minLength": 1
    },
    "filters": {
      "type": "array",
      "items": {
        "type": "string",
        "minLength": 1
      },
      "minItems": 1,
      "uniqueItems": true
    },
    "status": {
      "type": "string",
      "enum": [
        "candidate",
        "approved",
        "quarantined",
        "rejected",
        "deprecated"
      ]
    },
    "pii_policy": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "required",
        "method",
        "status"
      ],
      "properties": {
        "required": {
          "type": "boolean"
        },
        "method": {
          "type": "string",
          "minLength": 1
        },
        "status": {
          "type": "string",
          "enum": [
            "not_started",
            "planned",
            "complete",
            "not_applicable"
          ]
        }
      }
    },
    "contamination_check": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "required",
        "method",
        "status"
      ],
      "properties": {
        "required": {
          "type": "boolean"
        },
        "method": {
          "type": "string",
          "minLength": 1
        },
        "status": {
          "type": "string",
          "enum": [
            "not_started",
            "planned",
            "complete",
            "not_applicable"
          ]
        }
      }
    },
    "reviewed_by": {
      "type": "string"
    },
    "reviewed_at": {
      "type": "string",
      "pattern": "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
    },
    "notes": {
      "type": "string"
    }
  }
}
